<!DOCTYPE HTML>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="keywords" content="" >
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="format-detection" content="telephone=no">
    <title>2016 굿모닝 경기 소통 크리에이터 공모전</title>
    <link rel="stylesheet" type="text/css" href="../css/general.css" >
    <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
    <script type="text/javascript" src="../js/jquery.scrollTo-min.js"></script>
    <script src="../js/layout.js"></script>
    <!--[if IE]>
    <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->
</head>
<body>
<div id="wrap">
    <!-- @ CONTAINER -->
    <section id="container" class="sub">
        <!-- @ CONTENTS -->
        <div id="contents">
            <!-- @ SUB TITLE AREA -->
            <div class="sub-title-area">
                <h2 class="tit">News & Info</h2>
            </div>
            <div class="write_title"></div>
            <div class="write_date">
                <span class="write_line"><strong>작성자 :</strong> <span id="writer_val"></span></span>
                <span class="write_line"><strong>조회수 :</strong> <span id="view_val"></span></span>
                <span id="file_area" style="display:none">
                    <em class="file_icon"></em><a id="file_link" href="#">파일</a>
                </span>
            </div>
            <div class="con_box"></div>
 
            <div class="btn_area">
                <a href="list.html" class="btn_blue">목록</a>
                <button type="button" class="btn_blue" onclick="updateBoard()">수정</button>
                <button type="button" class="btn_blue" onclick="deleteBoard()">삭제</button>
            </div>
        </div>
        <!-- CONTENTS @ -->
    </section>
    <!-- CONTAINER @ -->
</div>
    <script>

        const params = new URLSearchParams(location.search);
        const id = params.get("id");

        fetch(`http://localhost:8080/board/${id}`)
            .then(res => res.json())
            .then(data => {

                document.querySelector(".write_title").innerText = data.title;
                document.getElementById("writer_val").innerText = data.writer;
                document.getElementById("view_val").innerText = data.viewCount;
                document.querySelector(".con_box").innerText = data.content;
 
                if (data.fileName) {
                    const fileArea = document.getElementById("file_area");
                    const fileLink = document.getElementById("file_link");
                    fileLink.href = `/uploads/${data.fileName}`;
                    fileLink.setAttribute("download", "");
                    fileLink.textContent = data.fileName;
                    fileArea.style.display = "";
                }
            });

        function updateBoard() {
            location.href = `write.html?id=${id}`;
        }
        
        function deleteBoard() {
            if (!confirm("삭제하시겠습니까?")) return;
 
            fetch(`http://localhost:8080/board/${id}`, {
                method: "DELETE"
            })
            .then(() => {
                alert("삭제 완료");
                location.href = "list.html";
            })
            .catch(err => {
                console.error("삭제 실패:", err);
                alert("삭제에 실패했습니다.");
            });
        }

    </script>
</body>
</html>
