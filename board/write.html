<!DOCTYPE HTML>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="keywords" content="" >
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="format-detection" content="telephone=no">
    <title>2016 굿모닝 경기 소통 크리에이터 공모전</title>
    <link rel="stylesheet" type="text/css" href="../css/general.css" >
    <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
    <script type="text/javascript" src="../js/jquery.scrollTo-min.js"></script>
    <script src="../js/layout.js"></script>
    <!--[if IE]>
    <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->
</head>
<body>
<div id="wrap">
     <!-- @ CONTAINER -->
     <section id="container" class="sub">
        <!-- @ CONTENTS -->
        <div id="contents">
               <div class="sub-title-area">
                <h2 class="tit">News & Info </h2>
				</div>
                <table class="basic_write">
                    <caption>News 입력</caption>
                    <colgroup>
                        <col style="width:150px">
                        <col style="width:*">
                    </colgroup>
					   <tr>
                        <th>제목<span class="star">*</span></th>
                        <td><input type="text" title="제목" name="" id="title" class="add_txt"  placeholder="제목 *"></td>
                    </tr>
                    <tr>
                        <th>작성자<span class="star">*</span></th>
                        <td><input type="text" title="성명" name="" id="writer" class="name_txt" placeholder="성명 *"></td>
                    </tr>
                 
                    <tr>
                        <th>첨부파일</th>
                        <td>
                            <input type="file" title="첨부파일" name="" id="file" placeholder="학과/부서" class="name_txt">
                        </td>
                    </tr>
                    <tr>
                        <th>내용 <span class="star">*</span></th>
                        <td>
                           <textarea name="" id="content" cols="30" rows="10" style="width:100%"></textarea>
                        </td>
                    </tr>
                    
                </table>               
                <div class="btn_area">
					<button type="button" class="btn_blue" onclick="writeBoard()">확인</button> 
					<a href="list.html" class="btn_blue_line">취소</a>
                </div>
        </div>
        <!-- CONTENTS @ -->
    </section>
    <!-- CONTAINER @ -->
</div>
    <script>
        const params = new URLSearchParams(location.search);
        const id = params.get("id");
 
        if (id) {
            fetch(`http://localhost:8080/board/${id}`)
                .then(res => res.json())
                .then(data => {
                    document.querySelector("#title").value = data.title;
                    document.querySelector("#writer").value = data.writer;
                    document.querySelector("#content").value = data.content;
                });
        }
 
        function writeBoard() {
 
            const title = document.querySelector("#title").value;
            const writer = document.querySelector("#writer").value;
            const content = document.querySelector("#content").value;
            const file = document.querySelector("#file").files[0];

            if (!title.trim() || !writer.trim() || !content.trim()) {
                alert("제목, 작성자, 내용을 모두 입력해주세요.");
                return;
            }
 
            const isEdit = id !== null;
 
            const url = isEdit
                ? `http://localhost:8080/board/${id}`
                : `http://localhost:8080/board`;
 
            const method = isEdit ? "PUT" : "POST";
 
            const formData = new FormData();
            formData.append("title", title);
            formData.append("writer", writer);
            formData.append("content", content);
 
            if (file) {
                formData.append("file", file);
            }
 
            fetch(url, {
                method: method,
                body: formData
            })
            .then(res => {
                if (!res.ok) {
                    throw new Error("서버 오류: " + res.status);
                }
                return res.json();
            })
            .then(() => {
                alert(isEdit ? "수정 완료" : "등록 완료");
                location.href = "list.html";
            })
            .catch(err => {
                console.error("저장 실패:", err);
                alert("저장에 실패했습니다. 콘솔을 확인해주세요.");
            });
        }
    </script>
</body>
</html>
